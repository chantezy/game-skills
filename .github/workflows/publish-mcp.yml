name: Publish MCP Server (Trusted Publisher)

# 使用 npm 官方推荐的 Trusted Publishing（OIDC 无 token 发布）。
# 官方文档：https://docs.npmjs.com/trusted-publishers
#
# 前置条件（必须先在 npmjs.com 配置好 Trusted Publisher）：
#   包设置 → Settings → Trusted Publisher → 添加 GitHub Actions
#     - Organization: chantezy
#     - Repository: game-skills
#     - Workflow filename: publish-mcp.yml  ← 必须和本文件名完全一致
#     - Allowed actions: npm publish
#
# 配置好之后，CI 就能用 OIDC 短期令牌发布，无需 NPM_TOKEN。
# provenance 会自动生成（不需要 --provenance flag）。

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/src/**'
      - 'mcp-server/package.json'
      - 'mcp-server/scripts/**'
      - 'game-*/**'
      - '*/SKILL.md'
  workflow_dispatch:  # 手动触发，便于调试

permissions:
  id-token: write  # Trusted Publisher 核心：OIDC 令牌权限
  contents: write  # 回写版本号到仓库

jobs:
  publish:
    runs-on: ubuntu-latest  # 必须用 GitHub-hosted runner（Trusted Publisher 不支持 self-hosted）

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted Publisher 要求 Node ≥ 22.14.0（自带 npm 11.5.1+）
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # 发布构建禁用缓存，保证依赖可重现
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Sync skills into mcp-server
        run: cd mcp-server && bash scripts/sync-skills.sh

      - name: Install & build
        run: cd mcp-server && npm ci && npm run build

      - name: Bump patch version
        run: |
          cd mcp-server
          npm version patch --no-git-tag-version

      # 可选：dry-run 验证（不实际发布）
      - name: Verify publish readiness (dry-run)
        run: cd mcp-server && npm publish --dry-run --access public
        continue-on-error: true  # dry-run 失败不阻塞

      # Trusted Publisher 核心步骤：
      # - npm CLI 自动检测到 OIDC 环境（GitHub Actions + id-token:write）
      # - 向 npm 换取短期发布令牌（几分钟有效，仅限当前 workflow）
      # - 发布后自动生成 provenance 签名证明
      # - 注意：不需要 --provenance flag，也不需要 NODE_AUTH_TOKEN
      - name: Publish to npm with Trusted Publisher (OIDC)
        run: cd mcp-server && npm publish --access public

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mcp-server/package.json mcp-server/package-lock.json
          git commit -m "chore: bump mcp-server version [skip ci]" || true
          git push
